spring.application.name=cineverse-auth-service
server.port=${AUTH_SERVICE_PORT:3001}

# H2 In-Memory Database (Development)
spring.datasource.url=${DB_URL:jdbc:h2:mem:cineverse_auth}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Enable H2 console for debugging (optional)
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:Y2luZXZlcnNlLWRheS0wMy1hdXRoLXNlcnZpY2UtZGV2ZWxvcG1lbnQtc2VjcmV0}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
